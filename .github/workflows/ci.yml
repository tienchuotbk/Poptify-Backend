name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: poptify
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e

      # Migration chạy trên MySQL service container (task 4.5).
      # Baseline migration thêm ở task 6.1 (gộp 1.5): tạo 3 bảng bootstrap.
      # Verify cả up + down: run → revert (down sạch) → run lại (up idempotent).
      - name: Migrations up/down/up (MySQL)
        run: |
          npm run migration:run
          npm run migration:revert
          npm run migration:run
        env:
          NODE_ENV: production
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USERNAME: root
          DB_PASSWORD: root
          DB_NAME: poptify

      # TODO(task 4.5): bật blocking sau khi giải quyết hết high/critical vuln.
      - name: Security audit (non-blocking tạm thời)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ---- Build & push Docker image lên GitHub Container Registry (ghcr.io) ----
  docker:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Image name (lowercase, ghcr yêu cầu)
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # tự động, không cần thêm
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  # ---- Deploy: SSH lên VPS, pull image mới, up lại compose ----
  deploy:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/poptify-backend
            IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
            # Package GHCR để Public → pull ẩn danh, không cần docker login.
            # (Nếu chuyển lại Private: thêm 1 dòng `docker login ghcr.io` với PAT read:packages.)
            export BACKEND_IMAGE="${IMAGE}:${{ github.sha }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
